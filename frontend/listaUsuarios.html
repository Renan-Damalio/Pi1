<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sistema Escolar - Lista de Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="d-flex" id="wrapper">
        <div class="bg-white border-end card-estilizado-lateral" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4 fw-bold text-primary border-bottom">
                MENU
            </div>
            <div class="list-group list-group-flush d-flex flex-column h-100">
                <a href="dashboard.html" class="list-group-item">Dashboard</a>
                <a href="listaUsuarios.html" class="list-group-item active">Usuários</a>                
                <a href="listaAluno.html" class="list-group-item">Alunos</a>               
                <a href="chatAluno.html" class="list-group-item">Mensagens/Chat</a>
                <a href="registrarEventosOcorrencias.html" class="list-group-item border-bottom">Ocorrências</a>
                <a href="index.html" class="list-group-item text-danger fw-bold mt-auto mb-4">
                    Sair
                </a>
            </div>
        </div>

        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-light bg-transparent py-4 px-4">
                <div class="d-flex align-items-center">
                    <h2 class="fs-2 m-0">Lista de Usuários</h2>
                </div>
            </nav>

            <div class="container-fluid px-4 d-flex flex-column align-items-center">

                <div class="card shadow-sm p-4 mb-4 card-estilizado w-100" style="max-width: 900px;">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th scope="col" class="text-start">Nome</th>
                                    <th scope="col" class="text-start">E-mail</th>
                                    <th scope="col" class="text-start">Senha</th>
                                    <th scope="col" class="text-start">Tipo</th>
                                    <th scope="col" class="text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="listaUsuarios"></tbody>
                        </table>
                    </div>
                </div>

                <div class="mt-3 w-100 text-center">
                    <button onclick="carregarUsuarios()" class="btn btn-primary btn-pt btn-acao btn-acao:active"
                        style="width: 30%; min-width: 200px;">Atualizar Lista</button>
                    <button onclick="window.location.href='cadastrarUsuario.html'"
                        class="btn btn-primary btn-pt btn-acao btn-acao:active" style="width: 30%;">Cadastrar
                        Usuário</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
