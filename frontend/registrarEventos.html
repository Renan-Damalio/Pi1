<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Sistema Escolar - Ocorrências e Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="d-flex" id="wrapper">
        <div class="bg-white border-end card-estilizado-lateral" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4 fw-bold text-primary border-bottom">
                MENU
            </div>
            <div class="list-group list-group-flush d-flex flex-column h-100">
                <a href="dashboard.html" class="list-group-item">Dashboard</a>
                <a href="listaUsuarios.html" class="list-group-item">Usuários</a>                
                <a href="listaAlunos.html" class="list-group-item">Alunos</a>               
                <a href="chatAluno.html" class="list-group-item">Mensagens/Chat</a>                
                <a href="listaEventos.html" class="list-group-item border-bottom">Eventos</a>
                
                <a href="index.html" class="list-group-item text-danger fw-bold mt-auto mb-4">
                    Sair
                </a>
            </div>
        </div>

        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-light bg-transparent py-4 px-4">
                <div class="d-flex align-items-center">
                    <h2 class="fs-2 m-0">Cadastrar Eventos e Ocorrências</h2>
                </div>
            </nav>

            <div class="container-fluid px-4 d-flex flex-column align-items-center">
                
                <section class="card shadow-sm p-4 card-estilizado w-100" style="max-width: 700px;">
                    <h3 class="mb-4 text-center">Registrar Eventos</h3>
                    
                    <div class="mb-3">
                        <label class="form-label fw-bold">Selecione o Aluno:</label>
                        <select id="selectAlunosRegistrar" class="form-select">
                            <option>Carregando alunos ...</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Descrição:</label>
                        <textarea id="descricaoEventos" class="form-control" style="height: 120px;" placeholder="Descreva a ocorrência ou rotina diária..."></textarea>
                    </div>

                    <div class="d-flex gap-3 justify-content-center">
                        <button class="btn btn-sm btn-acao btn-excluir" onclick="registrarOcorrencia()">
                            Registrar Ocorrência
                        </button>
                        <button class="btn btn-sm btn-acao btn-editar me-2" onclick="registrarRotina()">
                            Registrar Rotina
                        </button>
                    </div>
                </section>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
