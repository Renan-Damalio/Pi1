<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema Escolar - Histórico do Aluno</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="d-flex" id="wrapper">
        <div class="bg-white border-end card-estilizado-lateral" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4 fw-bold text-primary border-bottom">MENU</div>
            <div class="list-group list-group-flush d-flex flex-column h-100">
                <a href="dashboard.html" class="list-group-item">Dashboard</a>
                <a href="listaUsuarios.html" class="list-group-item">Usuários</a>
                <a href="listaAluno.html" class="list-group-item">Alunos</a>
                <a href="chatAluno.html" class="list-group-item">Mensagens/Chat</a>
                <a href="registrarEventos.html" class="list-group-item">Registrar Eventos</a>
                <a href="index.html" class="list-group-item text-danger fw-bold mt-auto mb-4">Sair</a>
            </div>
        </div>

        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-light bg-transparent py-4 px-4">
                <h2 class="fs-2 m-0">Histórico do Aluno</h2>
            </nav>

            <div class="container-fluid px-4">
                <div class="card shadow-sm p-4 mb-4 card-estilizado">
                    <div class="d-flex align-items-center">
                        <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center" style="width: 60px; height: 60px; font-size: 24px;">
                            🎓
                        </div>
                        <div class="ms-4">
                            <h3 id="histNomeAluno" class="mb-1 fw-bold">Carregando...</h3>
                            <p class="text-muted mb-0">
                                <span id="histIdadeAluno">--</span> anos | 
                                Turma: <span id="histTurmaAluno">--</span>
                            </p>
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-7">
                        <div class="card shadow-sm p-4 mb-4 h-100">
                            <h4 class="fw-bold mb-4">📅 Eventos e Registros</h4>
                            <div class="table-responsive">
                                <table class="table table-hover">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Data</th>
                                            <th>Tipo</th>
                                            <th>Descrição</th>
                                        </tr>
                                    </thead>
                                    <tbody id="listaEventosAluno">
                                        </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-5">
                        <div class="card shadow-sm p-4 mb-4 h-100">
                            <h4 class="fw-bold mb-4">💬 Histórico de Chat</h4>
                            <div id="historicoMensagens" class="chat-display" style="height: 400px; border-radius: 10px;">
                                </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
