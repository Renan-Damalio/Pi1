<!DOCTYPE html>
<html lang="pt-br">

<head>
    <title>Sistema Escolar - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="d-flex" id="wrapper">
        <div class="bg-white border-end card-estilizado-lateral" id="sidebar-wrapper">
            <div class="sidebar-heading text-center py-4 fw-bold text-primary border-bottom">
                MENU
            </div>
            <div class="list-group list-group-flush d-flex flex-column h-100">
                <a href="dashboard.html" class="list-group-item">Dashboard</a>
                <a href="listaUsuarios.html" class="list-group-item">Usuários</a>                
                <a href="listaAlunos.html" class="list-group-item">Alunos</a>               
                <a href="chatAluno.html" class="list-group-item active">Mensagens/Chat</a>                
                <a href="listaEventos.html" class="list-group-item border-bottom">Eventos</a>
                <a href="index.html" class="list-group-item text-danger fw-bold mt-auto mb-4">
                    Sair
                </a>
            </div>
        </div>

        <div id="page-content-wrapper">
            <nav class="navbar navbar-expand-lg navbar-light bg-transparent py-4 px-4">
                <div class="d-flex align-items-center">
                    <h2 class="fs-2 m-0">Chat</h2>
                </div>
            </nav>

            <div class="container-fluid px-4 d-flex flex-column align-items-center">

                <div class="card shadow-sm p-4 mb-4 card-estilizado w-100" style="max-width: 900px;">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover">
                            <thead>
                                <tr>
                                    <th scope="col">Nome</th>
                                    <th scope="col">Turma</th>
                                    <th scope="col">Responsável</th>
                                    <th scope="col" class="text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="listaAlunosChat"></tbody>
                        </table>
                    </div>
                </div>

                <div class="mt-3 w-100 text-center">
                    <button onclick="carregarAlunosChat()" style="width: 30%;"
                        class=" btn btn-primary btn-pt btn-acao btn-acao:active mb-4">Atualizar Lista</button>
                </div>

                <div class="card shadow-sm p-4 mb-4 card-estilizado w-100" style="max-width: 900px;">
                    <h3>Chat por Aluno</h3>
                    <div id="chatBox" class="chat-display">Selecione um aluno para ver as mensagens</div>
                    <input type="text" id="msgChat" placeholder="Digite uma mensagem...">
                    <button onclick="enviarMensagem()" class="btn btn-primary btn-pt btn-acao btn-acao:active"
                        style="width: 30%;">Enviar</button>
                </section>
            </div>
        </div>
    </div>
  





    <script src="script.js"></script>
</body>

</html>
